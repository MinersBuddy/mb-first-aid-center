<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
  :root {
    --orange: #F5A623;
    --orange-light: #FFB84D;
    --orange-dim: rgba(245,166,35,0.15);
    --bg: #0D1B2A;
    --bg2: #142032;
    --card: #1A2B3C;
    --card2: #1F3347;
    --border: rgba(245,166,35,0.2);
    --text: #FFFFFF;
    --text-muted: rgba(255,255,255,0.5);
    --radius: 16px;
    --transition: 0.3s cubic-bezier(0.4,0,0.2,1);
  }
  .light {
    --bg: #F0EEE8;
    --bg2: #E8E5DC;
    --card: #FFFFFF;
    --card2: #F5F3EE;
    --border: rgba(245,166,35,0.3);
    --text: #0D1B2A;
    --text-muted: rgba(13,27,42,0.5);
    --orange-dim: rgba(245,166,35,0.1);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    transition: background var(--transition), color var(--transition);
  }

  /* NAV */
  nav {
    background: var(--bg2);
    padding: 16px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
    position: sticky; top: 0; z-index: 100;
  }
  .logo { font-family:'Syne',sans-serif; font-size:20px; font-weight:800; }
  .logo span { color: var(--orange); }
  .nav-right { display:flex; align-items:center; gap:12px; }
  .theme-btn {
    background: var(--card); border: none; border-radius:50%;
    width:38px; height:38px; cursor:pointer; font-size:18px;
    display:flex; align-items:center; justify-content:center;
    transition: var(--transition);
    color: var(--text);
  }
  .theme-btn:hover { background: var(--orange-dim); }
  .avatar {
    width:38px; height:38px; border-radius:50%;
    background: var(--orange); display:flex; align-items:center; justify-content:center;
    font-family:'Syne',sans-serif; font-weight:700; font-size:14px; color:#000;
  }

  /* HEADER SECTION */
  .header-section {
    padding: 24px 20px 16px;
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
  }
  .header-tag {
    display: inline-flex; align-items:center; gap:6px;
    background: var(--orange-dim); border:1px solid var(--border);
    border-radius:20px; padding:4px 12px; margin-bottom:10px;
    font-size:11px; font-weight:600; color:var(--orange); letter-spacing:0.5px;
    text-transform: uppercase;
  }
  .header-title { font-family:'Syne',sans-serif; font-size:22px; font-weight:800; margin-bottom:4px; }
  .header-title span { color:var(--orange); }
  .header-sub { font-size:13px; color:var(--text-muted); }

  /* STATS BAR */
  .stats-bar {
    display:flex; gap:12px; padding:16px 20px;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
    overflow-x: auto;
    scrollbar-width: none;
  }
  .stats-bar::-webkit-scrollbar { display:none; }
  .stat-chip {
    background: var(--card); border:1px solid var(--border);
    border-radius:12px; padding:10px 16px; white-space:nowrap;
    display:flex; flex-direction:column; align-items:center; gap:2px;
    min-width: 80px;
  }
  .stat-num { font-family:'Syne',sans-serif; font-size:20px; font-weight:800; color:var(--orange); }
  .stat-label { font-size:11px; color:var(--text-muted); }

  /* SEARCH & FILTERS */
  .controls { padding:16px 20px; display:flex; flex-direction:column; gap:10px; }
  .search-box {
    display:flex; align-items:center; gap:10px;
    background:var(--card); border:1px solid var(--border);
    border-radius:14px; padding:12px 16px;
    transition: var(--transition);
  }
  .search-box:focus-within {
    border-color: var(--orange);
    box-shadow: 0 0 0 3px var(--orange-dim);
  }
  .search-icon { font-size:16px; color:var(--text-muted); flex-shrink:0; }
  .search-box input {
    background:none; border:none; outline:none;
    color:var(--text); font-family:'DM Sans',sans-serif;
    font-size:14px; width:100%;
  }
  .search-box input::placeholder { color:var(--text-muted); }
  .filter-row { display:flex; gap:8px; overflow-x:auto; scrollbar-width:none; }
  .filter-row::-webkit-scrollbar { display:none; }
  select {
    background: var(--card); border:1px solid var(--border);
    border-radius:10px; padding:9px 12px; color:var(--text);
    font-family:'DM Sans',sans-serif; font-size:13px;
    outline:none; cursor:pointer; white-space:nowrap;
    min-width:130px; flex-shrink:0;
    transition: var(--transition);
    -webkit-appearance: none;
  }
  select:focus { border-color:var(--orange); }
  .locate-btn {
    display:flex; align-items:center; gap:6px;
    background:var(--orange); border:none; border-radius:10px;
    padding:9px 14px; color:#000; font-family:'DM Sans',sans-serif;
    font-size:13px; font-weight:600; cursor:pointer; white-space:nowrap;
    flex-shrink:0; transition: var(--transition);
  }
  .locate-btn:hover { background:var(--orange-light); transform:translateY(-1px); }
  .locate-btn:active { transform:translateY(0); }

  /* VIEW TOGGLE */
  .view-toggle {
    display:flex; gap:0; padding:0 20px 12px;
  }
  .toggle-btn {
    flex:1; padding:10px; border:1px solid var(--border);
    background:var(--card); color:var(--text-muted);
    font-family:'DM Sans',sans-serif; font-size:13px; font-weight:500;
    cursor:pointer; transition:var(--transition);
    display:flex; align-items:center; justify-content:center; gap:6px;
  }
  .toggle-btn:first-child { border-radius:10px 0 0 10px; }
  .toggle-btn:last-child { border-radius:0 10px 10px 0; border-left:none; }
  .toggle-btn.active {
    background:var(--orange-dim); color:var(--orange);
    border-color:var(--orange);
  }

  /* MAP CONTAINER */
  #map-view { display:block; }
  #list-view { display:none; }
  #map-view.hidden, #list-view.hidden { display:none; }
  #list-view.visible { display:block; }
  #map-view.visible { display:block; }

  /* FAKE MAP — Real MapBox needs token */
  .map-container {
    margin: 0 20px 16px;
    border-radius:var(--radius);
    border:1px solid var(--border);
    overflow:hidden;
    position:relative;
    height: 320px;
    background: var(--card);
  }
  .map-inner {
    width:100%; height:100%;
    background: linear-gradient(135deg, #0a1628 0%, #0d2137 30%, #0a1e30 60%, #091525 100%);
    position:relative; overflow:hidden;
  }
  .light .map-inner {
    background: linear-gradient(135deg, #d4e8f0 0%, #c8dfe8 30%, #d0e5ef 60%, #cce0ea 100%);
  }
  /* grid lines */
  .map-inner::before {
    content:''; position:absolute; inset:0;
    background-image:
      linear-gradient(rgba(245,166,35,0.05) 1px, transparent 1px),
      linear-gradient(90deg, rgba(245,166,35,0.05) 1px, transparent 1px);
    background-size: 40px 40px;
  }
  /* India outline — simplified SVG overlay */
  .map-svg { position:absolute; inset:0; width:100%; height:100%; }
  .map-overlay {
    position:absolute; inset:0; display:flex;
    align-items:center; justify-content:center;
    flex-direction:column; gap:8px;
  }
  .map-label {
    background: var(--orange-dim); border:1px solid var(--border);
    border-radius:8px; padding:6px 12px;
    font-size:11px; color:var(--orange); font-weight:600;
    backdrop-filter:blur(8px);
  }
  /* Dots on map */
  .map-dot {
    position:absolute; width:10px; height:10px;
    background:var(--orange); border-radius:50%;
    border:2px solid rgba(245,166,35,0.3);
    cursor:pointer; transition:var(--transition);
    animation: pulse 2s infinite;
  }
  .map-dot:hover { transform:scale(1.8); z-index:10; }
  .map-dot.highlight { background:#fff; border-color:var(--orange); }
  @keyframes pulse {
    0%,100% { box-shadow:0 0 0 0 rgba(245,166,35,0.4); }
    50% { box-shadow:0 0 0 6px rgba(245,166,35,0); }
  }
  .map-legend {
    position:absolute; bottom:12px; left:12px;
    background:rgba(13,27,42,0.85); backdrop-filter:blur(8px);
    border:1px solid var(--border); border-radius:10px; padding:8px 12px;
    display:flex; flex-direction:column; gap:4px;
  }
  .light .map-legend { background:rgba(255,255,255,0.85); }
  .legend-item { display:flex; align-items:center; gap:6px; font-size:10px; color:var(--text-muted); }
  .legend-dot { width:8px; height:8px; border-radius:50%; background:var(--orange); flex-shrink:0; }
  .map-zoom {
    position:absolute; bottom:12px; right:12px;
    display:flex; flex-direction:column; gap:4px;
  }
  .zoom-btn {
    width:32px; height:32px; background:rgba(13,27,42,0.85);
    backdrop-filter:blur(8px); border:1px solid var(--border);
    border-radius:8px; color:var(--text); font-size:16px;
    cursor:pointer; display:flex; align-items:center; justify-content:center;
    transition:var(--transition);
  }
  .light .zoom-btn { background:rgba(255,255,255,0.85); }
  .zoom-btn:hover { background:var(--orange-dim); color:var(--orange); border-color:var(--orange); }

  /* RESULTS */
  .results-header {
    padding:4px 20px 12px;
    display:flex; align-items:center; justify-content:space-between;
  }
  .results-count { font-size:13px; color:var(--text-muted); }
  .results-count span { color:var(--orange); font-weight:700; }
  .sort-label { font-size:12px; color:var(--text-muted); }

  /* CARDS */
  .cards-list { padding:0 20px; display:flex; flex-direction:column; gap:12px; padding-bottom:100px; }
  .centre-card {
    background:var(--card); border:1px solid var(--border);
    border-radius:var(--radius); overflow:hidden;
    display:flex; cursor:pointer;
    transition:var(--transition);
    position:relative;
  }
  .centre-card:hover {
    border-color:var(--orange);
    box-shadow:0 4px 20px rgba(245,166,35,0.15);
    transform:translateY(-2px);
  }
  .centre-card::before {
    content:''; position:absolute; left:0; top:0; bottom:0;
    width:3px; background:var(--orange); border-radius:3px 0 0 3px;
  }
  .card-body { padding:14px 14px 14px 18px; flex:1; min-width:0; }
  .card-top { display:flex; align-items:flex-start; justify-content:space-between; gap:8px; margin-bottom:6px; }
  .card-id {
    background:var(--orange-dim); border:1px solid var(--border);
    border-radius:6px; padding:2px 7px;
    font-size:10px; color:var(--orange); font-weight:700;
    flex-shrink:0; font-family:'Syne',sans-serif;
  }
  .card-badge {
    background:rgba(16,185,129,0.15); border:1px solid rgba(16,185,129,0.3);
    border-radius:6px; padding:2px 7px;
    font-size:10px; color:#10b981; font-weight:600; flex-shrink:0;
  }
  .card-name {
    font-family:'Syne',sans-serif; font-size:13px; font-weight:700;
    color:var(--text); line-height:1.4; margin-bottom:6px;
  }
  .card-address { font-size:12px; color:var(--text-muted); line-height:1.4; margin-bottom:8px; }
  .card-meta { display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
  .meta-chip {
    display:flex; align-items:center; gap:4px;
    font-size:11px; color:var(--text-muted);
    background:var(--card2); border-radius:6px; padding:3px 8px;
  }
  .meta-chip.state { color:var(--orange); background:var(--orange-dim); }
  .card-actions { display:flex; align-items:center; padding-right:14px; }
  .dir-btn {
    width:36px; height:36px; border-radius:10px;
    background:var(--orange-dim); border:1px solid var(--border);
    color:var(--orange); font-size:16px; cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    transition:var(--transition); flex-shrink:0;
  }
  .dir-btn:hover { background:var(--orange); color:#000; }

  /* BOTTOM TOAST */
  .toast {
    position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(80px);
    background:var(--card); border:1px solid var(--orange);
    border-radius:14px; padding:12px 20px;
    display:flex; align-items:center; gap:10px;
    font-size:13px; font-weight:500; color:var(--text);
    box-shadow:0 8px 32px rgba(0,0,0,0.3);
    transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1);
    z-index:999; white-space:nowrap;
  }
  .toast.show { transform:translateX(-50%) translateY(0); }
  .toast-icon { font-size:18px; }

  /* EMPTY */
  .empty-state {
    text-align:center; padding:48px 20px;
    display:flex; flex-direction:column; align-items:center; gap:12px;
  }
  .empty-icon { font-size:48px; opacity:0.3; }
  .empty-title { font-family:'Syne',sans-serif; font-size:18px; font-weight:700; }
  .empty-sub { font-size:13px; color:var(--text-muted); }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width:4px; }
  ::-webkit-scrollbar-track { background:transparent; }
  ::-webkit-scrollbar-thumb { background:var(--border); border-radius:4px; }
</style>
</head>

let filtered = [...CENTRES];
let isDark = true;
let currentView = 'map';

// Init
function init() {
  populateFilters();
  renderCards(CENTRES);
  renderMapDots(CENTRES);
}

function populateFilters() {
  const states = [...new Set(CENTRES.map(c => c.state))].sort();
  const sf = document.getElementById('stateFilter');
  states.forEach(s => { const o=document.createElement('option'); o.value=s; o.textContent=s; sf.appendChild(o); });
  document.getElementById('stateCount').textContent = states.length;
}

function filterCentres() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const state = document.getElementById('stateFilter').value;
  const city = document.getElementById('cityFilter').value;
  document.getElementById('clearBtn').style.display = q ? 'block' : 'none';

  filtered = CENTRES.filter(c => {
    const matchQ = !q || c.name.toLowerCase().includes(q) || c.city.toLowerCase().includes(q) || c.state.toLowerCase().includes(q) || c.address.toLowerCase().includes(q);
    const matchState = !state || c.state === state;
    const matchCity = !city || c.city === city;
    return matchQ && matchState && matchCity;
  });

  // Update city filter based on state
  if (state) {
    const cities = [...new Set(CENTRES.filter(c => c.state === state).map(c => c.city))].sort();
    const cf = document.getElementById('cityFilter');
    cf.innerHTML = '<option value="">All Cities</option>';
    cities.forEach(ci => { const o=document.createElement('option'); o.value=ci; o.textContent=ci; cf.appendChild(o); });
  }

  document.getElementById('resultNum').textContent = filtered.length;
  document.getElementById('filteredCount').textContent = filtered.length;
  renderCards(filtered);
  renderMapDots(filtered);
}

function clearSearch() {
  document.getElementById('searchInput').value = '';
  filterCentres();
}

function renderCards(data) {
  const list = document.getElementById('cardsList');
  if (!data.length) {
    list.innerHTML = `<div class="empty-state"><div class="empty-icon">🏥</div><div class="empty-title">No centres found</div><div class="empty-sub">Try different search terms</div></div>`;
    return;
  }
  list.innerHTML = data.map(c => `
    <div class="centre-card" onclick="openMaps(${c.coordinates.lat},${c.coordinates.lng},'${c.name.replace(/'/g,"\\'")}')">
      <div class="card-body">
        <div class="card-top">
          <span class="card-id">#${String(c.id).padStart(2,'0')}</span>
          <span class="card-badge">✓ DGMS Listed</span>
        </div>
        <div class="card-name">${c.name}</div>
        <div class="card-address">📍 ${c.address}</div>
        <div class="card-meta">
          <span class="meta-chip state">🏛️ ${c.state}</span>
          <span class="meta-chip">🏙️ ${c.city}</span>
          <span class="meta-chip">📮 ${c.pincode}</span>
        </div>
      </div>
      <div class="card-actions">
        <button class="dir-btn" onclick="event.stopPropagation();openMaps(${c.coordinates.lat},${c.coordinates.lng},'${c.name.replace(/'/g,"\\'")}')">🧭</button>
      </div>
    </div>
  `).join('');
}

// Map dots — proportional to India bounds
function latLngToXY(lat, lng) {
  // India approx: lat 8-37, lng 68-98
  const minLat=8, maxLat=37, minLng=68, maxLng=98;
  // Map container: 400x320
  const x = ((lng - minLng) / (maxLng - minLng)) * 340 + 30;
  const y = ((maxLat - lat) / (maxLat - minLat)) * 280 + 20;
  return {x, y};
}

function renderMapDots(data) {
  const container = document.getElementById('mapDots');
  container.innerHTML = '';
  data.forEach(c => {
    const {x, y} = latLngToXY(c.coordinates.lat, c.coordinates.lng);
    const dot = document.createElement('div');
    dot.className = 'map-dot';
    dot.style.left = x + 'px';
    dot.style.top = y + 'px';
    dot.title = c.name;
    dot.onclick = () => showToast(`${c.name} — ${c.city}`);
    container.appendChild(dot);
  });
}

function openMaps(lat, lng, name) {
  const url = `https://www.google.com/maps/search/?api=1&query=${lat},${lng}`;
  window.open(url, '_blank');
}

function findNearest() {
  showToast('Finding nearest centre...');
  if (!navigator.geolocation) { showToast('Geolocation not supported'); return; }
  navigator.geolocation.getCurrentPosition(pos => {
    const {latitude: lat, longitude: lng} = pos.coords;
    let nearest = null, minDist = Infinity;
    CENTRES.forEach(c => {
      const d = Math.sqrt((c.coordinates.lat-lat)**2 + (c.coordinates.lng-lng)**2);
      if (d < minDist) { minDist = d; nearest = c; }
    });
    if (nearest) {
      showToast(`Nearest: ${nearest.name} — ${nearest.city}`);
      renderCards([nearest, ...filtered.filter(c => c.id !== nearest.id)]);
      // Highlight on map
      document.querySelectorAll('.map-dot').forEach(d => d.classList.remove('highlight'));
      const {x,y} = latLngToXY(nearest.coordinates.lat, nearest.coordinates.lng);
      const dots = document.querySelectorAll('.map-dot');
      dots.forEach(d => {
        if (Math.abs(parseInt(d.style.left)-x)<5 && Math.abs(parseInt(d.style.top)-y)<5)
          d.classList.add('highlight');
      });
    }
  }, () => showToast('Location access denied'));
}

function switchView(view) {
  currentView = view;
  const mapView = document.getElementById('map-view');
  const listView = document.getElementById('list-view');
  const mapBtn = document.getElementById('mapToggle');
  const listBtn = document.getElementById('listToggle');
  if (view === 'map') {
    mapView.className='visible'; listView.className='hidden';
    mapBtn.className='toggle-btn active'; listBtn.className='toggle-btn';
  } else {
    mapView.className='hidden'; listView.className='visible';
    mapBtn.className='toggle-btn'; listBtn.className='toggle-btn active';
  }
}

function toggleTheme() {
  isDark = !isDark;
  document.body.classList.toggle('light', !isDark);
  document.getElementById('themeBtn').textContent = isDark ? '🌙' : '☀️';
}

function showToast(msg) {
  const t = document.getElementById('toast');
  document.getElementById('toastMsg').textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}
